<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vinh Khanh Guide Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            background: #fffaf4;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        .poi-marker {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .poi-dot {
            width: 18px;
            height: 18px;
            border-radius: 999px;
            border: 2px solid white;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.18);
        }

        .popup-title {
            font-weight: 700;
            color: #5c3721;
            margin-bottom: 4px;
        }

        .popup-meta {
            font-size: 12px;
            color: #6b4f3a;
            margin: 0;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <script>
        const defaultCenter = [10.75768, 106.70125];
        const map = L.map("map", { zoomControl: true }).setView(defaultCenter, 16);
        const poiLayer = L.layerGroup().addTo(map);
        const radiusLayer = L.layerGroup().addTo(map);
        let userMarker = null;

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "© OpenStreetMap"
        }).addTo(map);

        function escapeHtml(value) {
            if (!value) {
                return "";
            }

            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll("\"", "&quot;")
                .replaceAll("'", "&#39;");
        }

        function colorForPoi(poi) {
            if (poi.isSelected) {
                return "#5c3721";
            }

            if (poi.isNearest) {
                return "#d9485f";
            }

            if (poi.isInsideRadius) {
                return "#2f9e44";
            }

            return "#2563eb";
        }

        function buildPoiIcon(color) {
            return L.divIcon({
                className: "poi-marker",
                html: `<div class="poi-dot" style="background:${color}"></div>`,
                iconSize: [18, 18],
                iconAnchor: [9, 9]
            });
        }

        function buildPoiPopup(poi) {
            const distanceText = poi.distanceMeters == null
                ? "Khoảng cách: N/A"
                : `Khoảng cách: ${Math.round(poi.distanceMeters)}m`;

            return `
                <div>
                    <div class="popup-title">${escapeHtml(poi.name)}</div>
                    <p class="popup-meta">${escapeHtml(poi.description)}</p>
                    <p class="popup-meta">${escapeHtml(poi.code)} | P${poi.priority}</p>
                    <p class="popup-meta">${distanceText}</p>
                </div>
            `;
        }

        function renderGuideState(state) {
            poiLayer.clearLayers();
            radiusLayer.clearLayers();

            if (userMarker) {
                map.removeLayer(userMarker);
                userMarker = null;
            }

            if (!state || !Array.isArray(state.pois) || state.pois.length === 0) {
                map.setView(defaultCenter, 16);
                return;
            }

            const bounds = [];

            state.pois.forEach(poi => {
                const color = colorForPoi(poi);
                const marker = L.marker([poi.latitude, poi.longitude], {
                    icon: buildPoiIcon(color)
                }).addTo(poiLayer);

                marker.bindPopup(buildPoiPopup(poi));

                L.circle([poi.latitude, poi.longitude], {
                    radius: poi.triggerRadiusMeters,
                    color: color,
                    weight: poi.isNearest || poi.isSelected ? 2 : 1,
                    fillColor: color,
                    fillOpacity: poi.isInsideRadius ? 0.18 : 0.08
                }).addTo(radiusLayer);

                if (poi.isNearest || poi.isSelected) {
                    marker.openPopup();
                }

                bounds.push([poi.latitude, poi.longitude]);
            });

            if (state.userLocation) {
                userMarker = L.circleMarker(
                    [state.userLocation.latitude, state.userLocation.longitude],
                    {
                        radius: 10,
                        color: "#0f172a",
                        weight: 2,
                        fillColor: "#f59e0b",
                        fillOpacity: 1
                    })
                    .addTo(map)
                    .bindPopup("Bạn đang ở đây");

                bounds.push([state.userLocation.latitude, state.userLocation.longitude]);
            }

            if (bounds.length > 1) {
                map.fitBounds(bounds, {
                    padding: [30, 30],
                    maxZoom: 17
                });
                return;
            }

            const center = state.center
                ? [state.center.latitude, state.center.longitude]
                : bounds[0] || defaultCenter;

            map.setView(center, 16);
        }

        window.renderGuideState = renderGuideState;
    </script>
</body>
</html>
